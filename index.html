<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>عجلة الحظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #1a237e;
    --blue-mid:  #1565c0;
    --gold:      #ffd700;
    --bg:        #eef2ff;
    --shadow:    rgba(26,35,126,0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 70% 5%,  #c5cff5 0%, transparent 55%),
      radial-gradient(ellipse at 5%  95%, #f0b8d4 0%, transparent 45%);
    overflow: hidden;
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px 6px;
  }

  h1 {
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-weight: 900;
    color: var(--blue-dark);
    margin-bottom: 8px;
  }

  /* ── LOADING ── */
  #loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex: 1;
  }
  .spinner {
    width: 50px; height: 50px;
    border: 5px solid #dde3f5;
    border-top-color: var(--blue-mid);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen p { font-size: 0.9rem; color: #666; font-weight: 600; }

  /* ── ERROR ── */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex: 1;
    text-align: center;
  }
  #error-screen p { font-size: 0.9rem; color: #c62828; font-weight: 600; max-width: 300px; }
  #retry-btn {
    padding: 10px 28px;
    background: var(--blue-mid); color: white;
    border: none; border-radius: 12px;
    font-family: 'Cairo', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer;
  }

  /* ── WHEEL SECTION ── */
  #wheel-section {
    display: none; flex-direction: column;
    align-items: center; width: 100%; flex: 1; min-height: 0;
  }

  #class-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px; flex-wrap: wrap; justify-content: center;
  }
  #class-bar label { font-size: 0.8rem; font-weight: 700; color: #444; }
  #class-select {
    padding: 5px 10px; border: 2px solid var(--blue-mid); border-radius: 9px;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 700;
    color: var(--blue-dark); background: white; direction: rtl; cursor: pointer; outline: none;
  }

  #info-bar {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.8rem; font-weight: 700; color: var(--blue-dark);
    margin-bottom: 6px;
  }
  #info-bar .sep { color: #ccc; }

  /* Wheel */
  .wheel-wrap {
    position: relative;
    width:  min(min(68vw, 62vh), 500px);
    height: min(min(68vw, 62vh), 500px);
    flex-shrink: 0;
  }
  .wheel-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(#ffd700, #ffe57a, #c8a400, #ffd700);
    box-shadow: 0 0 0 5px #1a237e, 0 10px 40px rgba(26,35,126,0.4);
  }
  .wheel-border { position: absolute; inset: 7px; border-radius: 50%; background: var(--blue-dark); }
  #wheelCanvas  { position: absolute; inset: 12px; border-radius: 50%; width: calc(100% - 24px); height: calc(100% - 24px); }
  .wheel-hub {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 22px; height: 22px;
    background: radial-gradient(circle at 35% 35%, #90caf9, #1565c0);
    border-radius: 50%; border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); z-index: 10;
  }
  .pointer {
    position: absolute; top: -4px;
    left: 50%; transform: translateX(-50%);
    z-index: 20;
    width: 28px; height: 42px;
  }
  .pointer-body {
    width: 28px; height: 42px;
    background: linear-gradient(180deg, #ffd700 0%, #c8a400 100%);
    clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    position: relative; left: 0;
  }
  .pointer-shine {
    position: absolute; top: 3px; left: 4px;
    width: 10px; height: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 100%);
    clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
  }

  #spin-btn {
    margin-top: 9px; padding: 9px 32px;
    font-family: 'Cairo', sans-serif; font-size: 0.97rem; font-weight: 900;
    color: white;
    background: linear-gradient(135deg, #1565c0 0%, #1a237e 100%);
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,35,126,0.42);
    transition: transform 0.15s; flex-shrink: 0;
  }
  #spin-btn:hover:not(:disabled) { transform: translateY(-2px); }
  #spin-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  #winner-box {
    display: none; align-items: center; gap: 8px;
    background: white; border-radius: 12px;
    padding: 7px 18px;
    box-shadow: 0 4px 18px var(--shadow);
    border: 2px solid var(--gold);
    margin-top: 7px; flex-shrink: 0;
    max-width: 90vw;
    animation: popIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  #winner-box .trophy { font-size: 1.3rem; }
  #winner-box .lbl    { font-size: 0.68rem; color: #aaa; font-weight: 600; }
  #winner-name { font-size: clamp(0.95rem, 3.5vw, 1.4rem); font-weight: 900; color: var(--blue-dark); }

  #reset-btn {
    margin-top: 5px; padding: 5px 18px;
    font-family: 'Cairo', sans-serif; font-size: 0.76rem; font-weight: 700;
    color: var(--blue-mid); background: transparent;
    border: 1.5px solid var(--blue-mid); border-radius: 50px;
    cursor: pointer; flex-shrink: 0;
  }
  #reset-btn:hover { background: var(--blue-mid); color: white; }

  @media (max-height: 650px) {
    h1 { font-size: 0.95rem; margin-bottom: 4px; }
    #spin-btn { padding: 7px 26px; font-size: 0.88rem; margin-top: 6px; }
    #winner-box { padding: 5px 14px; margin-top: 5px; }
    #info-bar { margin-bottom: 3px; }
    #class-bar { margin-bottom: 2px; }
  }
</style>
</head>
<body>
<div id="app">
  <h1>🎡 عجلة الحظ</h1>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>جاري تحميل بيانات الطلاب…</p>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <p id="error-msg">⚠️ تعذّر تحميل البيانات</p>
    <button id="retry-btn">🔄 إعادة المحاولة</button>
  </div>

  <!-- Wheel -->
  <div id="wheel-section">
    <div id="class-bar">
      <label>الصف:</label>
      <select id="class-select"></select>
    </div>

    <div id="info-bar">
      <span>👥 إجمالي: <b id="total-count">0</b></span>
      <span class="sep">|</span>
      <span>⏳ متبقي: <b id="rem-count">0</b></span>
    </div>

    <div class="wheel-wrap" id="wheelWrap">
      <div class="wheel-ring"></div>
      <div class="wheel-border"></div>
      <canvas id="wheelCanvas"></canvas>
      <div class="wheel-hub"></div>
      <div class="pointer"><div class="pointer-body"><div class="pointer-shine"></div></div></div>
    </div>

    <button id="spin-btn">🎯 تدوير العجلة</button>

    <div id="winner-box">
      <div class="trophy">🏆</div>
      <div>
        <div class="lbl">الطالب المختار</div>
        <div id="winner-name"></div>
      </div>
    </div>

    <button id="reset-btn">🔄 إعادة جميع الأسماء</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG – الرابط المنشور + أرقام الـ gid
// ══════════════════════════════════════════════
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR8rLSTduQlqDOyMzuVU316rVSxBudbRIfLyq16PtsEYsJmeoFPQLnWcndkpZqROiCYPAYIpcfdlHG3/pub?output=csv';

const CLASSES = [
  { name: 'سادس 1', gid: 0           },
  { name: 'سادس 2', gid: 1128502108  },
  { name: 'سادس 3', gid: 947726729   },
  { name: 'سادس 4', gid: 2094124764  },
  { name: 'سادس 5', gid: 167007871   },
  { name: 'سادس 6', gid: 235681459   },
  { name: 'سادس 7', gid: 443357717   },
  { name: 'سادس 8', gid: 1153203970  },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let allStudents  = [];
let remaining    = [];
let spinning     = false;
let currentAngle = 0;
let currentClass = 0;

const COLORS = [
  '#1565c0','#ffffff','#42a5f5','#ffffff',
  '#7b1fa2','#ffffff','#e91e63','#ffffff',
  '#ab47bc','#ffffff','#1a237e','#ffffff',
  '#f06292','#ffffff','#29b6f6','#ffffff',
];

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function buildSelect() {
  const sel = document.getElementById('class-select');
  CLASSES.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

async function fetchClass(idx) {
  showScreen('loading');
  const url = BASE_URL + '&gid=' + CLASSES[idx].gid;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('فشل الاتصال');
    const text  = await resp.text();
    const names = text.split('\n')
      .map(l => l.split(',')[0].replace(/^"|"$/g,'').trim())
      .filter(Boolean);
    if (!names.length) throw new Error('لا توجد أسماء في هذا الفصل');
    initWheel(names, idx);
  } catch(e) {
    document.getElementById('error-msg').textContent = '⚠️ ' + e.message;
    showScreen('error');
  }
}

function showScreen(s) {
  document.getElementById('loading-screen').style.display = s==='loading' ? 'flex' : 'none';
  document.getElementById('error-screen').style.display   = s==='error'   ? 'flex' : 'none';
  document.getElementById('wheel-section').style.display  = s==='wheel'   ? 'flex' : 'none';
}

function initWheel(names, idx) {
  currentClass = idx;
  allStudents  = [...names];
  remaining    = [...names];
  currentAngle = 0;
  document.getElementById('class-select').value = idx;
  document.getElementById('winner-box').style.display = 'none';
  document.getElementById('spin-btn').disabled        = false;
  document.getElementById('spin-btn').textContent     = '🎯 تدوير العجلة';
  showScreen('wheel');
  updateInfo();
  drawWheel(0);
}

function updateInfo() {
  document.getElementById('total-count').textContent = allStudents.length;
  document.getElementById('rem-count').textContent   = remaining.length;
}

// ══════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════
function drawWheel(angle) {
  const cv = document.getElementById('wheelCanvas');
  const wp = document.getElementById('wheelWrap');
  const sz = wp.offsetWidth - 24;
  cv.width = cv.height = sz;
  const ctx = cv.getContext('2d');
  const cx = sz/2, cy = sz/2, r = sz/2;
  ctx.clearRect(0,0,sz,sz);

  if (!remaining.length) {
    ctx.fillStyle = '#1565c0';
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = `bold ${sz*0.065}px Cairo`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('اكتمل الجميع 🎉', cx, cy);
    return;
  }

  const n = remaining.length, sl = (2*Math.PI)/n;

  for (let i = 0; i < n; i++) {
    const sa=angle+i*sl, ea=sa+sl, mid=sa+sl/2;
    const col=COLORS[i%COLORS.length], isW=col==='#ffffff';

    ctx.save();
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
    if (!isW) {
      const g = ctx.createLinearGradient(
        cx+r*0.2*Math.cos(mid), cy+r*0.2*Math.sin(mid),
        cx+r*Math.cos(mid),     cy+r*Math.sin(mid));
      g.addColorStop(0, col); g.addColorStop(1, lighten(col, 0.28));
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = '#ffffff';
    }
    ctx.fill();
    ctx.strokeStyle = '#1a237e'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(mid);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    const maxCh = n>20 ? 11 : n>12 ? 9 : 11;
    const disp  = remaining[i].length>maxCh ? remaining[i].substring(0,maxCh)+'…' : remaining[i];
    const fs    = Math.max(8, Math.min(12, r*0.5/Math.sqrt(n)*2));
    ctx.font      = `bold ${fs}px Cairo`;
    ctx.fillStyle = isW ? '#1a237e' : '#ffffff';
    ctx.shadowColor='rgba(0,0,0,0.22)'; ctx.shadowBlur=2;
    ctx.fillText(disp, r*0.95, 0);
    ctx.restore();
  }

  const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.1);
  ig.addColorStop(0,'rgba(255,255,255,0.8)'); ig.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r*0.1,0,Math.PI*2); ctx.fillStyle=ig; ctx.fill();
}

function lighten(hex,a) {
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${~~Math.min(255,(n>>16)+a*255)},${~~Math.min(255,((n>>8)&0xff)+a*255)},${~~Math.min(255,(n&0xff)+a*255)})`;
}

// ══════════════════════════════════════════════
// SPIN
// ══════════════════════════════════════════════
document.getElementById('spin-btn').addEventListener('click', () => {
  if (spinning || !remaining.length) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('winner-box').style.display = 'none';

  const n=remaining.length, wi=Math.floor(Math.random()*n);
  const sl=(2*Math.PI)/n;
  const tgt=-Math.PI/2-(wi*sl+sl/2);
  const tot=(5+Math.floor(Math.random()*5))*2*Math.PI+((tgt-currentAngle)%(2*Math.PI));
  const dur=4000+Math.random()*1200, t0=performance.now(), a0=currentAngle;
  const ease=t=>1-Math.pow(1-t,4);

  function frame(now) {
    const t=Math.min((now-t0)/dur,1);
    currentAngle=(a0+tot*ease(t))%(2*Math.PI);
    drawWheel(currentAngle);
    if (t<1) { requestAnimationFrame(frame); return; }

    spinning=false;
    document.getElementById('spin-btn').disabled=false;
    const winner=remaining[wi];

    setTimeout(() => {
      remaining.splice(wi,1); updateInfo(); drawWheel(currentAngle);
      document.getElementById('winner-name').textContent=winner;
      const box=document.getElementById('winner-box');
      box.style.display='flex'; box.style.animation='none';
      void box.offsetWidth;
      box.style.animation='popIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275)';
      if (!remaining.length) {
        document.getElementById('spin-btn').disabled=true;
        document.getElementById('spin-btn').textContent='🎉 اكتمل الجميع!';
      }
    }, 500);
  }
  requestAnimationFrame(frame);
});

// ══════════════════════════════════════════════
// RESET & CLASS CHANGE
// ══════════════════════════════════════════════
document.getElementById('reset-btn').addEventListener('click', () => {
  remaining=[...allStudents]; currentAngle=0; updateInfo(); drawWheel(0);
  document.getElementById('winner-box').style.display='none';
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('spin-btn').textContent='🎯 تدوير العجلة';
});

document.getElementById('class-select').addEventListener('change', e => {
  fetchClass(+e.target.value);
});

document.getElementById('retry-btn').addEventListener('click', () => {
  fetchClass(currentClass);
});

window.addEventListener('resize', () => {
  if (allStudents.length) drawWheel(currentAngle);
});

// ══════════════════════════════════════════════
// START
// ══════════════════════════════════════════════
buildSelect();
fetchClass(0);
</script>
</body>
</html>
